<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABS IN 90</title>

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0b1016">

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#0b1016;
  color:white;
  padding:20px;
}

h1 {
  text-align:center;
}

.card {
  background:#121a24;
  border-radius:16px;
  padding:20px;
  margin-top:20px;
}

button {
  padding:14px;
  border:none;
  border-radius:12px;
  width:100%;
  margin-top:10px;
  font-weight:bold;
}

.primary { background:#4f8cff; color:white; }
.green { background:#21b879; color:white; }

.check {
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #333;
}

</style>
</head>

<body>

<h1>ABS IN 90</h1>

<div class="card">
  <h2 id="dayText">Starting Tomorrow</h2>
  <p id="coach">Stay disciplined.</p>

  <button class="primary" onclick="completeDay()">Complete Day</button>
</div>

<div class="card">
  <h2>Checklist</h2>
  <div id="checklist"></div>
</div>

<div class="card">
  <h2>Stats</h2>
  <p>XP: <span id="xp">0</span></p>
  <p>Streak: <span id="streak">0</span></p>
</div>

<script>
let state = JSON.parse(localStorage.getItem("abs")) || {
  start: new Date(Date.now()+86400000).toDateString(),
  xp: 0,
  streak: 0,
  last: null,
  checks: {}
};

const tasks = [
  "Wake 6AM",
  "Workout",
  "Meals on plan",
  "128oz water",
  "10k steps",
  "Sleep on time"
];

function save() {
  localStorage.setItem("abs", JSON.stringify(state));
}

function render() {
  document.getElementById("xp").innerText = state.xp;
  document.getElementById("streak").innerText = state.streak;

  let today = new Date().toDateString();

  if (today < state.start) {
    document.getElementById("dayText").innerText = "Starting Tomorrow";
  } else {
    document.getElementById("dayText").innerText = "Day Active";
  }

  let html = "";
  tasks.forEach(t => {
    let done = state.checks[t];
    html += `<div class="check" onclick="toggle('${t}')">
      <span>${t}</span>
      <span>${done ? "✅" : "⬜️"}</span>
    </div>`;
  });

  document.getElementById("checklist").innerHTML = html;
}

function toggle(task) {
  state.checks[task] = !state.checks[task];
  state.xp += state.checks[task] ? 10 : -10;
  save();
  render();
}

function completeDay() {
  let today = new Date().toDateString();

  if (state.last !== today) {
    state.streak += 1;
    state.xp += 50;
    state.last = today;
    state.checks = {};
  }

  save();
  render();
}

render();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
