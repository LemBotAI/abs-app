<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABS IN 90</title>

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0b1016">

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#0b1016;
  color:white;
  text-align:center;
}

.container {
  padding:20px;
}

h1 {
  font-size:32px;
}

.card {
  background:#121a24;
  border-radius:16px;
  padding:20px;
  margin-top:20px;
}

button {
  padding:15px;
  border:none;
  border-radius:12px;
  font-size:16px;
  margin-top:10px;
  width:100%;
}

.primary { background:#4f8cff; color:white; }
.green { background:#21b879; color:white; }

</style>
</head>

<body>

<div class="container">
  <h1>ABS IN 90</h1>

  <div class="card">
    <h2 id="dayText">Starting Tomorrow</h2>
    <p id="coach">Get ready. Tomorrow we start.</p>
    
    <button class="primary" onclick="completeDay()">Complete Day</button>
    <button class="green" onclick="addXP()">+10 XP</button>
  </div>

  <div class="card">
    <h2>Stats</h2>
    <p>XP: <span id="xp">0</span></p>
    <p>Streak: <span id="streak">0</span></p>
  </div>
</div>

<script>
let state = JSON.parse(localStorage.getItem("abs")) || {
  start: new Date(Date.now() + 86400000).toDateString(),
  xp: 0,
  streak: 0,
  last: null
};

function save() {
  localStorage.setItem("abs", JSON.stringify(state));
}

function render() {
  document.getElementById("xp").innerText = state.xp;
  document.getElementById("streak").innerText = state.streak;

  let today = new Date().toDateString();

  if (today < state.start) {
    document.getElementById("dayText").innerText = "Starting Tomorrow";
  } else {
    document.getElementById("dayText").innerText = "Day Active";
  }
}

function completeDay() {
  let today = new Date().toDateString();

  if (state.last !== today) {
    state.streak += 1;
    state.xp += 50;
    state.last = today;
  }

  save();
  render();
}

function addXP() {
  state.xp += 10;
  save();
  render();
}

render();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
