<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABS IN 90</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0b1016">

<style>
body{margin:0;font-family:-apple-system;background:#0b1016;color:#fff;padding:16px;max-width:900px;margin:auto}
.card{background:#121a24;border-radius:16px;padding:16px;margin-top:16px}
h1{text-align:center}
.btn{width:100%;padding:14px;border:none;border-radius:12px;margin-top:10px;font-weight:bold}
.green{background:#21b879;color:#fff}
.red{background:#e46f6f;color:#fff}
.check{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #333}
.barWrap{height:12px;background:#0a1118;border-radius:999px;overflow:hidden;margin-top:10px}
.bar{height:100%;background:linear-gradient(90deg,#4f8cff,#21b879);width:0%}
.week{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:10px}
.dayBox{padding:8px;border-radius:8px;text-align:center;font-size:12px}
</style>
</head>

<body>

<h1>ABS IN 90</h1>

<div class="card">
<h2 id="dayText">Starting Tomorrow</h2>
<p id="scoreText">Score: 0</p>

<div class="barWrap">
<div id="progressBar" class="bar"></div>
</div>

<div class="week" id="weekStrip"></div>

<button class="btn green" onclick="completeDay()">Complete Day</button>
</div>

<div class="card">
<h2>Checklist</h2>
<div id="checklist"></div>
</div>

<div class="card">
<h2>Stats</h2>
<p>XP: <span id="xp">0</span></p>
<p>Streak: <span id="streak">0</span></p>
</div>

<script>
let state = JSON.parse(localStorage.getItem("abs")) || {
start:new Date(Date.now()+86400000).toDateString(),
xp:0,
streak:0,
last:null,
checks:{},
history:{}
};

const tasks=["Wake 6AM","Workout","Meals","Water","Steps","Sleep"];

function save(){localStorage.setItem("abs",JSON.stringify(state));}

function render(){
document.getElementById("xp").innerText=state.xp;
document.getElementById("streak").innerText=state.streak;

let today=new Date().toDateString();

document.getElementById("dayText").innerText =
today < state.start ? "Starting Tomorrow" : "Day Active";

// checklist
let html="";
tasks.forEach(t=>{
let done=state.checks[t];
html+=`<div class="check" onclick="toggle('${t}')">
<span>${t}</span>
<span>${done?"✅":"⬜️"}</span>
</div>`;
});
document.getElementById("checklist").innerHTML=html;

// score
let doneCount=Object.values(state.checks).filter(Boolean).length;
let score=Math.round((doneCount/tasks.length)*100);

document.getElementById("scoreText").innerText="Score: "+score;
document.getElementById("progressBar").style.width=score+"%";

// weekly strip
let strip="";
for(let i=6;i>=0;i--){
let d=new Date();
d.setDate(d.getDate()-i);
let key=d.toDateString();

let bg="#1b2633";
if(state.history[key]==="done") bg="#21b879";
if(state.history[key]==="miss") bg="#e46f6f";

strip+=`<div class="dayBox" style="background:${bg}">
${d.toLocaleDateString(undefined,{weekday:"narrow"})}
</div>`;
}
document.getElementById("weekStrip").innerHTML=strip;
}

function toggle(task){
state.checks[task]=!state.checks[task];
state.xp+=state.checks[task]?10:-10;
save();
render();
}

function completeDay(){
let today=new Date().toDateString();

if(state.last!==today){
state.streak++;
state.xp+=50;
state.last=today;
state.history[today]="done";
state.checks={};
}
save();
render();
}

render();

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
